name: eucharystki_mobile
description: "Малітоўнік Эўхарыстак - mobile app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^14.2.8
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  flutter_html: ^3.0.0-beta.2
  wakelock_plus: ^1.2.8
  intl: ^0.19.0
  flutter_quill: ^10.8.3
  collection: ^1.18.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
